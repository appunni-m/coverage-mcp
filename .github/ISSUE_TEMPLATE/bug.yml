name: Bug report
description: Report a reproducible Coverage MCP defect
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include exact commands and sanitized inputs. Do not include private logs or source.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Coverage MCP version and schema revision
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Python version and operating system
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, private source, logs, paths, and database contents.
          required: true

[tox]
envlist = py312, py313, py314, lint, type, coverage, package
isolated_build = true

[testenv]
extras = dev
commands = pytest -q

[testenv:lint]
commands =
    ruff check .
    ruff format --check .

[testenv:type]
commands = mypy coverage_mcp

[testenv:coverage]
commands =
    coverage erase
    coverage run -m pytest -q
    coverage report -m

[testenv:package]
commands =
    python -m build
    python -m twine check dist/*
